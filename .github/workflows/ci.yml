# Arch A5 — Continuous Integration
#
# Runs on every push to main and every pull request. Three jobs:
#
#   quality     — type-check, lint, and the Vitest unit suite (the same gates
#                 enforced locally; vitest uses the forks pool pinned in
#                 vitest.config.ts so it's reliable on CI runners).
#   migrations  — boots a throwaway local Postgres via the Supabase CLI and
#                 applies every migration from scratch, then lints the schema.
#                 This catches a broken or out-of-order migration before it can
#                 reach the remote database — no credentials required (the local
#                 stack is ephemeral and self-contained).
#   e2e         — Arch A2: seeds the namespaced e2e tenants and runs the
#                 authenticated Playwright suite (route-crawl · critical flows ·
#                 cross-role denial · institution isolation). Gated on the
#                 Supabase secrets being configured — until then it skips GREEN
#                 (so it never blocks a merge); once the secrets exist it runs
#                 for real. Required secrets are listed in docs/ci-cd.md.
#
# Make `quality`, `migrations` (and, once the secrets are set, `e2e`) "required
# status checks" in the branch-protection rule for `main`. See docs/ci-cd.md.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref cancels the in-flight run — saves runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type-check, lint & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      # Hard gate: the lint debt was cleared, so any ESLint *error* fails the
      # build. `react-hooks/set-state-in-effect` is intentionally a non-blocking
      # `warn` (fires on the standard data-fetch pattern); warnings don't fail
      # eslint. See docs/ci-cd.md.
      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  migrations:
    name: Validate migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Boot local Postgres
        run: supabase db start

      - name: Apply every migration from scratch
        # --include-all applies all local migration files even with no remote
        # history table — a clean from-zero replay. A failure here means a
        # migration is malformed or depends on something not yet created.
        run: supabase migration up --local --include-all

      - name: Lint schema for typing errors
        run: supabase db lint --local --schema public --level error --fail-on error

      - name: Stop local stack
        if: always()
        run: supabase stop --no-backup

  e2e:
    name: Authenticated e2e (route-crawl · flows · cross-role · isolation)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Public (build-time) Supabase config + the runtime env the app reads so
      # pages don't crash during the crawl. All are GitHub Actions secrets.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
      RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
      RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SCHEDULER_API_URL: ${{ secrets.SCHEDULER_API_URL }}
    steps:
      - uses: actions/checkout@v4

      # Gate: only run the suite when the Supabase secrets exist. Without them
      # the job exits GREEN (skipped) so it never blocks a merge before the repo
      # owner has configured CI secrets.
      - name: Check for Supabase secrets
        id: gate
        run: |
          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] && [ -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=e2e skipped::Add SUPABASE_SERVICE_ROLE_KEY, NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY in Settings → Secrets and variables → Actions to enable the authenticated e2e gate (see docs/ci-cd.md)."
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: Install Playwright (chromium)
        if: steps.gate.outputs.run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build the app
        if: steps.gate.outputs.run == 'true'
        run: npm run build

      - name: Seed the e2e tenants
        if: steps.gate.outputs.run == 'true'
        run: npm run seed:e2e

      # CI=true (set by Actions) makes playwright.config use `npm start` (the
      # built app) + 1 retry. The `authed` project runs setup → route-crawl →
      # flows → cross-role → isolation.
      - name: Run authenticated e2e
        if: steps.gate.outputs.run == 'true'
        run: npx playwright test --project=authed

      - name: Upload Playwright report
        if: ${{ failure() && steps.gate.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
